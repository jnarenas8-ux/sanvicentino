{% extends 'base.html' %}

{% block title %}Crear Producto - San Vicentino{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold mb-8 text-gray-800">Crear Nuevo Producto</h1>
    
    <div class="bg-white rounded-lg shadow-lg p-8">
        <form method="POST" class="space-y-6">
            <!-- Nombre -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">Nombre del Producto</label>
                <input type="text" name="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Ej: Agua Purificada">
            </div>
            
            <!-- Descripción -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">Descripción</label>
                <textarea name="descripcion" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Descripción del producto..."></textarea>
            </div>
            
            <!-- Categoría -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">Categoría</label>
                <select name="categoria" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    <option value="">Selecciona una categoría</option>
                    <option value="Agua">Agua</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Lácteos">Lácteos</option>
                    <option value="Frutas">Frutas</option>
                    <option value="Verduras">Verduras</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            
            <!-- Precio -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">Precio (S/.)</label>
                <input type="number" name="precio" required step="0.01" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="0.00">
            </div>
            
            <!-- Stock -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">Stock Disponible</label>
                <input type="number" name="stock" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="0">
            </div>
            
            <!-- Imagen URL -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">URL de la Imagen</label>
                <input type="url" name="imagen" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
            
            <!-- Botones -->
            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition">
                    Crear Producto
                </button>
                <a href="{{ url_for('productos') }}" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sanvicentino
      MYSQL_USER: usuario_app
      MYSQL_PASSWORD: password_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  flask:
    build: Dockerfile
    container_name: flask_app
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  mysql_data:
